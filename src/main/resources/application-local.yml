logging:
  level:
    kr.or.kids: DEBUG
    jdbc.sqltiming: INFO
    jdbc.resultsettable: INFO

mybatis:
  type-aliases-package: kr.or.kids
  mapper-locations:
    - classpath*:mybatis/postgresql/mapper/**/*.xml
  configuration:
    cache-enabled: true
    lazy-loading-enabled: true
    multiple-result-sets-enabled: true
    use-column-label: true
    auto-mapping-behavior: partial
    auto-mapping-unknown-column-behavior: WARNING
    default-executor-type: simple
    default-statement-timeout: 30
    default-fetch-size: 100
    safe-row-bounds-enabled: false
    map-underscore-to-camel-case: true  # snake_case를 camelCase로 자동 변환
    local-cache-scope: session
    jdbc-type-for-null: NULL
management:
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
